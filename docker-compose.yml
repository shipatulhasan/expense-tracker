services:
  mongo:
    image: mongo:7
    container_name: expense-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: expense_tracker
    volumes:
      - mongo-data:/data/db
    networks:
      - expense-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - expense-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: expense-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - expense-net

volumes:
  mongo-data:
networks:
  expense-net:
    driver: bridge
